[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 999999
via_ir = true
evm_version = "cancun"
fs_permissions = [
    { access = "read", path = "./out" },
    { access = "read-write", path = "./deployments" },
]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true

[rpc_endpoints]
xlayer = "https://rpc.xlayer.tech"
